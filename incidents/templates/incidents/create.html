{% extends 'incidents/base.html' %}

{% block content %}
<div class="card">
    <h2>Create New Incident</h2>

    <form method="post" autocomplete="off">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Save</button>
        <a class="btn" href="{% url 'index' %}">Cancel</a>
    </form>
</div>
{% endblock %}
